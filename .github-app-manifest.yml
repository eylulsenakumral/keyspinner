# GitHub App Manifest for KeySpinner
# Use this when creating the GitHub App at: https://github.com/settings/apps/new

# App Basics
name: KeySpinner
description: Auto-detects leaked secrets in your repositories and creates remediation PRs
url: https://keyspinner.autocompany.dev
# Replace with your actual URL after deployment

# Webhook
webhook_active: true
webhook_url: https://keyspinner.autocompany.dev/webhook
# Replace with your actual Worker URL

# Permissions (Read)
contents: read
# Needs to read file content for scanning

# Permissions (Write)
pull_requests: write
# Needs to create remediation PRs

# Permissions (Metadata)
metadata: read
# For repository information

# Organization access (optional)
# organization: your-org-name

# Default events
default_events:
  - push
  - installation
  - installation_repositories

# Where to install
# - User accounts (individual repos)
# - Organization accounts (multiple repos)
