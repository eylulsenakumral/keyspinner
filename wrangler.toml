name = "keyspinner"
main = "src/worker/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# D1 Database binding (create with: wrangler d1 create keyspinner-db)
[[d1_databases]]
binding = "DB"
database_name = "keyspinner-db"
database_id = "YOUR_D1_DATABASE_ID" # Replace after creation

# GitHub App secrets (set via: wrangler secret put GITHUB_APP_PRIVATE_KEY)
# Required secrets:
# - GITHUB_APP_ID: GitHub App ID (number)
# - GITHUB_APP_PRIVATE_KEY: PEM private key (string)
# - GITHUB_WEBHOOK_SECRET: Webhook secret (string)

# Optional secrets for email notifications:
# - SENDGRID_API_KEY: SendGrid API key
# - FROM_EMAIL: From email address

[routes]
# Custom domain (optional)
# pattern = "keyspinner.example.com"
# custom_domain = true

# Triggers for scheduled tasks (optional - for periodic repo checks)
[triggers]
crons = ["0 */6 * * *"] # Every 6 hours
